<!-- Custom tags partial for MkDocs Material -->
{% if tags %}
<h2 id="__tags">Taggar</h2>
<div class="md-tags">
  {% for tag in tags %}
    <a href="../taggar/#{{ tag | lower | replace(' ', '-') }}" class="md-tag">{{ tag }}</a>
  {% endfor %}
</div>
{% endif %}

<style>
.md-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin: 1rem 0;
}

.md-tag {
  display: inline-block;
  padding: 0.25rem 0.75rem;
  background-color: var(--md-accent-fg-color--transparent, rgba(0, 64, 113, 0.1));
  color: var(--md-typeset-a-color, #0066b3);
  border-radius: 1rem;
  font-size: 0.75rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s ease;
}

.md-tag:hover {
  background-color: var(--md-primary-fg-color, #004071);
  color: white;
  text-decoration: none;
}
</style>
