site_name: SFI - Svenska för invandrare
site_description: Kunskapsbas om SFI - struktur, kurser, regelverk och historia
site_author: SFI Wiki
site_url: https://ophoria.github.io/SFI/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Byt till mörkt läge
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Byt till ljust läge
  language: sv
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

nav:
  - Hem: index.md
  - Översikt: oversikt.md
  - Studievägar: studievagar.md
  - Kurser:
    - kurser/index.md
    - Kurs A: kurser/kurs-a.md
    - Kurs B: kurser/kurs-b.md
    - Kurs C: kurser/kurs-c.md
    - Kurs D: kurser/kurs-d.md
  - Betyg & Prov: betyg-och-prov.md
  - Regelverk: regelverk.md
  - Historia: historia.md
  - Källor: kallor.md
  - Index: index-sida.md

copyright: Copyright &copy; SFI Wiki | Källor från Skolverket och Sveriges Riksdag
