site_name: SFI - Svenska för invandrare
site_description: Kunskapsbas om SFI - struktur, kurser, regelverk och historia
site_author: SFI Wiki
site_url: https://ophoria.github.io/SFI/

theme:
  name: material
  language: sv
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Byt till mörkt läge
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Byt till ljust läge
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - pymdownx.critic
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3
  - meta
  - abbr

extra:
  alternate:
    - name: Svenska
      link: /
      lang: sv
    - name: English
      link: /en/
      lang: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ophoria/SFI
  analytics:
    feedback:
      title: Var denna sida till hjälp?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Denna sida var till hjälp
          data: 1
          note: Tack för din feedback!
        - icon: material/emoticon-sad-outline
          name: Denna sida kan förbättras
          data: 0
          note: Tack för din feedback! Hjälp oss att förbättra.

copyright: Copyright &copy; SFI Wiki | Källor från Skolverket och Sveriges Riksdag
